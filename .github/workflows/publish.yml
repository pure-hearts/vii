name: Publish Package

on:
  push:
    tags:
      - "cli@*"
      - "release@*"
      - "storage@*"
      - "utils@*"
      - "release-scripts@*"
      - "use-axios@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: Release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0

      - name: Set node version to 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Build Package
        run: |
          TAG_NAME="${{ github.ref_name }}"
          PKG_NAME="${TAG_NAME%%@*}"
          pnpm --filter "@vyron/$PKG_NAME" build

      - name: Publish package
        run: |
          TAG_NAME="${{ github.ref_name }}"
          PKG_NAME="${TAG_NAME%%@*}"
          pnpm --filter "@vyron/$PKG_NAME" publish --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
